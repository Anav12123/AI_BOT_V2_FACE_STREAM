<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
canvas { width: 100%; height: 100%; display: block; }
#name-tag {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  color: #fff;
  padding: 6px 20px;
  border-radius: 16px;
  font-size: 14px;
  font-weight: 500;
  font-family: -apple-system, sans-serif;
}
</style>
</head>
<body>
<canvas id="face"></canvas>
<div id="name-tag">Sam</div>

<script>
(function() {
  var canvas = document.getElementById('face');
  var ctx = canvas.getContext('2d');
  var mouthOpenness = 0;
  var targetMouth = 0;
  var blinkTimer = 0;
  var isBlinking = false;
  var eyeOpenness = 1;
  var isSpeaking = false;
  var speakEndTime = 0;

  function resize() {
    canvas.width = canvas.clientWidth * (window.devicePixelRatio || 1);
    canvas.height = canvas.clientHeight * (window.devicePixelRatio || 1);
  }
  resize();
  window.addEventListener('resize', resize);

  function drawFace() {
    var w = canvas.width;
    var h = canvas.height;
    var cx = w / 2;
    var cy = h / 2 - h * 0.05;
    var faceR = Math.min(w, h) * 0.28;

    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, w, h);

    var grd = ctx.createRadialGradient(cx, cy + faceR * 0.5, faceR * 0.1, cx, cy, faceR * 2);
    grd.addColorStop(0, 'rgba(100, 120, 255, 0.08)');
    grd.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, w, h);

    ctx.beginPath();
    ctx.arc(cx, cy, faceR, 0, Math.PI * 2);
    ctx.fillStyle = '#e8c4a0';
    ctx.fill();
    ctx.strokeStyle = '#d4a574';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.beginPath();
    ctx.ellipse(cx, cy - faceR * 0.95, faceR * 1.05, faceR * 0.55, 0, Math.PI, 0);
    ctx.fillStyle = '#3d2b1f';
    ctx.fill();

    var eyeY = cy - faceR * 0.12;
    var eyeSpacing = faceR * 0.35;
    var eyeW = faceR * 0.18;
    var eyeH = faceR * 0.22 * eyeOpenness;

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(cx - eyeSpacing, eyeY, eyeW, Math.max(1, eyeH), 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + eyeSpacing, eyeY, eyeW, Math.max(1, eyeH), 0, 0, Math.PI * 2);
    ctx.fill();

    if (eyeOpenness > 0.2) {
      var pupilR = faceR * 0.09;
      ctx.fillStyle = '#2c1810';
      ctx.beginPath();
      ctx.arc(cx - eyeSpacing, eyeY, pupilR, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + eyeSpacing, eyeY, pupilR, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(cx - eyeSpacing - pupilR * 0.3, eyeY - pupilR * 0.3, pupilR * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + eyeSpacing - pupilR * 0.3, eyeY - pupilR * 0.3, pupilR * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.strokeStyle = '#8b6914';
    ctx.lineWidth = faceR * 0.04;
    ctx.beginPath();
    ctx.moveTo(cx - eyeSpacing - eyeW * 1.1, eyeY - eyeH * 0.8);
    ctx.quadraticCurveTo(cx - eyeSpacing, eyeY - eyeH * 1.5, cx - eyeSpacing + eyeW * 1.1, eyeY - eyeH * 0.8);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + eyeSpacing - eyeW * 1.1, eyeY - eyeH * 0.8);
    ctx.quadraticCurveTo(cx + eyeSpacing, eyeY - eyeH * 1.5, cx + eyeSpacing + eyeW * 1.1, eyeY - eyeH * 0.8);
    ctx.stroke();

    ctx.beginPath();
    ctx.ellipse(cx, cy + faceR * 0.15, faceR * 0.08, faceR * 0.1, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#d4a574';
    ctx.fill();

    var mouthY = cy + faceR * 0.42;
    var mouthW = faceR * 0.3;
    var mouthH = faceR * 0.05 + (mouthOpenness * faceR * 0.2);

    if (mouthOpenness > 0.05) {
      ctx.beginPath();
      ctx.ellipse(cx, mouthY, mouthW, mouthH, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#8b3a3a';
      ctx.fill();
      ctx.strokeStyle = '#c4836e';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      if (mouthH > faceR * 0.08) {
        ctx.beginPath();
        ctx.ellipse(cx, mouthY + mouthH * 0.3, mouthW * 0.5, mouthH * 0.25, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#d45a5a';
        ctx.fill();
      }
    } else {
      ctx.beginPath();
      ctx.moveTo(cx - mouthW, mouthY);
      ctx.quadraticCurveTo(cx, mouthY + faceR * 0.06, cx + mouthW, mouthY);
      ctx.strokeStyle = '#c4836e';
      ctx.lineWidth = 2.5;
      ctx.stroke();
    }

    if (isSpeaking) {
      var pulseR = faceR * 1.15 + Math.sin(Date.now() / 300) * faceR * 0.03;
      ctx.beginPath();
      ctx.arc(cx, cy, pulseR, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(100, 180, 255, 0.15)';
      ctx.lineWidth = 3;
      ctx.stroke();
    }
  }

  function animate() {
    mouthOpenness += (targetMouth - mouthOpenness) * 0.3;

    if (isSpeaking && Date.now() < speakEndTime) {
      var t = Date.now() / 120;
      targetMouth = 0.3 + Math.abs(Math.sin(t * 2.7)) * 0.4 + Math.abs(Math.sin(t * 4.3)) * 0.2;
    } else if (isSpeaking && Date.now() >= speakEndTime) {
      isSpeaking = false;
      targetMouth = 0;
    }

    blinkTimer += 16;
    if (!isBlinking && blinkTimer > 3000 + Math.random() * 4000) {
      isBlinking = true;
      blinkTimer = 0;
    }
    if (isBlinking) {
      if (blinkTimer < 80) eyeOpenness = Math.max(0, 1 - blinkTimer / 80);
      else if (blinkTimer < 160) eyeOpenness = Math.min(1, (blinkTimer - 80) / 80);
      else { isBlinking = false; eyeOpenness = 1; blinkTimer = 0; }
    }

    drawFace();
    requestAnimationFrame(animate);
  }
  animate();

  function connectWebSocket() {
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    var url = proto + '//' + location.host + '/avatar-ws';
    var ws = new WebSocket(url);

    ws.onopen = function() {
      ws.send(JSON.stringify({ type: 'ready' }));
    };

    ws.onmessage = function(event) {
      if (typeof event.data === 'string') {
        var msg = JSON.parse(event.data);
        if (msg.type === 'speak') {
          isSpeaking = true;
          speakEndTime = Date.now() + (msg.duration_ms || 2000);
        } else if (msg.type === 'stop') {
          isSpeaking = false;
          targetMouth = 0;
          speakEndTime = 0;
        }
      }
    };

    ws.onclose = function() {
      setTimeout(connectWebSocket, 2000);
    };
  }

  connectWebSocket();
})();
</script>
</body>
</html>
